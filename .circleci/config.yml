version: 2.1

parameters:
  npm_publish_mode:
    type: enum
    enum:
      - none
      - beta
    default: none
  npm_publish_version:
    type: string
    default: ""
  npm_publish_dist_tag:
    type: enum
    enum:
      - beta
      - next
      - alpha
    default: beta

jobs:
  build:
    docker:
      # docker image version must match version in .nvmrc
      - image: 'cimg/node:24.14.1'
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-node-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-node-{{ .Branch }}
            - v1-node
      - run:
          name: Install packages
          command: npm ci
      - run:
          name: Compile the typescript
          command: npm run compile
      - save_cache:
          key: v1-node-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: .
          paths:
            - .

  test-unit:
    docker:
      # docker image version must match version in .nvmrc
      - image: 'cimg/node:24.14.1'
    steps:
      - attach_workspace:
          at: /home/circleci/project
      - run:
          name: Run unit tests
          command: npm run test:unit

  npm-publish-package:
    parameters:
      release_kind:
        type: enum
        enum:
          - beta
          - release
      release_version:
        type: string
        default: ""
      dist_tag:
        type: string
        default: "latest"
    docker:
      # docker image version must match version in .nvmrc
      - image: 'cimg/node:24.14.1'
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-node-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-node-{{ .Branch }}
            - v1-node
      - run:
          name: Install packages
          command: npm ci
      - run:
          name: Get npm OIDC token
          command: |
            OIDC_TOKEN="$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')"
            printf 'export NPM_ID_TOKEN=%q\n' "$OIDC_TOKEN" >> "$BASH_ENV"
      - run:
          name: Publish package
          command: |
            source "$BASH_ENV"
            CIRCLE_PIPELINE_NUMBER="<< pipeline.number >>" \
            NPM_RELEASE_KIND="<< parameters.release_kind >>" \
            NPM_PUBLISH_VERSION="<< parameters.release_version >>" \
            NPM_DIST_TAG="<< parameters.dist_tag >>" \
            bash support/build/npm-publish-package.sh

workflows:
  branch-build-test:
    when:
      equal: [ none, << pipeline.parameters.npm_publish_mode >> ]
    jobs:
      - build:
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - test-unit:
          requires:
            - build
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/

  tag-build-test-publish:
    when:
      equal: [ none, << pipeline.parameters.npm_publish_mode >> ]
    jobs:
      - build:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
      - test-unit:
          requires:
            - build
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
      - npm-publish-package:
          name: publish-release
          release_kind: release
          release_version: ""
          dist_tag: latest
          context:
            - npm-publish
          requires:
            - test-unit
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

  npm_beta_publish:
    when:
      equal: [ beta, << pipeline.parameters.npm_publish_mode >> ]
    jobs:
      - npm-publish-package:
          release_kind: beta
          release_version: << pipeline.parameters.npm_publish_version >>
          dist_tag: << pipeline.parameters.npm_publish_dist_tag >>
          context:
            - npm-publish
